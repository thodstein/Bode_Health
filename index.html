<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health Pro</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <h1>BODE HEALTH <span style="color:#4fd1c5; font-size:0.6em">PRO</span></h1>
            <p>Система биохакинга и анализа рисков</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="stack">💊 Стек препаратов</button>
            <button class="tab-btn" data-tab="nutrition">🥗 Питание</button>
            <button class="tab-btn" data-tab="training">🏋️ Тренировки</button>
            <button class="tab-btn" data-tab="risks">📊 Анализ рисков</button>
        </nav>

        <!-- Вкладка СТЕК -->
        <div id="stack" class="tab-content active">
            <div class="card">
                <h2>Добавить препарат</h2>
                <form id="drugForm" class="grid-form">
                    <input type="text" id="dName" placeholder="Название (напр. Testosterone)" required>
                    <input type="text" id="dDose" placeholder="Доза (напр. 200 мг/нед)" required>
                    <select id="dRoute"><option value="oral">💊 Перорально</option><option value="inject">💉 Инъекционно</option><option value="topical">🧴 Местно</option></select>
                    <input type="text" id="dPeriod" placeholder="Длительность (напр. 10 недель)" required>
                    
                    <div class="range-group"><label>Сердце (CV)</label><input type="range" id="rCV" min="0" max="10" value="0"><span class="val">0</span></div>
                    <div class="range-group"><label>Печень (Hep)</label><input type="range" id="rHep" min="0" max="10" value="0"><span class="val">0</span></div>
                    <div class="range-group"><label>Невро (Neuro)</label><input type="range" id="rNeuro" min="0" max="10" value="0"><span class="val">0</span></div>
                    <div class="range-group"><label>Липиды (Lipid)</label><input type="range" id="rLipid" min="0" max="10" value="0"><span class="val">0</span></div>
                    <div class="range-group"><label>Почки (Nephro)</label><input type="range" id="rNephro" min="0" max="10" value="0"><span class="val">0</span></div>
                    <div class="range-group"><label>Кровь (Hemo)</label><input type="range" id="rHemo" min="0" max="10" value="0"><span class="val">0</span></div>
                    
                    <button type="submit" class="btn-add">Добавить в стек</button>
                </form>
            </div>
            <div id="stackList" class="list-container"></div>
        </div>

        <!-- Вкладка ПИТАНИЕ -->
        <div id="nutrition" class="tab-content">
            <div class="card">
                <h2>Дневник питания</h2>
                <div class="grid-form">
                    <input type="number" id="calIn" placeholder="Ккал">
                    <input type="number" id="protIn" placeholder="Белки (г)">
                    <input type="number" id="fatIn" placeholder="Жиры (г)">
                    <input type="number" id="carbIn" placeholder="Углеводы (г)">
                    <button onclick="addLog('nutrition')" class="btn-add">Записать</button>
                </div>
            </div>
            <ul id="nutriList" class="simple-list"></ul>
        </div>

        <!-- Вкладка ТРЕНИРОВКИ -->
        <div id="training" class="tab-content">
            <div class="card">
                <h2>Журнал тренировок</h2>
                <div class="grid-form">
                    <input type="text" id="trainEx" placeholder="Упражнение">
                    <input type="text" id="trainSets" placeholder="Подходы x Повторы">
                    <input type="text" id="trainWeight" placeholder="Вес (кг)">
                    <button onclick="addLog('training')" class="btn-add">Записать</button>
                </div>
            </div>
            <ul id="trainList" class="simple-list"></ul>
        </div>

        <!-- Вкладка РИСКИ -->
        <div id="risks" class="tab-content">
            <div class="card highlight">
                <h2>🛡️ Калькулятор рисков</h2>
                <p>На основе текущего стека препаратов</p>
                <button id="calcBtn" class="btn-calc">РАССЧИТАТЬ ПРОФИЛЬ</button>
            </div>
            <div id="riskResult" style="display:none; margin-top:20px;">
                <canvas id="riskChart"></canvas>
                <div id="riskText" class="risk-text"></div>
            </div>
        </div>
    </div>
    <script src="assets/js/app.js"></script>
</body>
</html>
