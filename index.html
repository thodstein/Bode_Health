<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health - Анализ рисков</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bode Health</h1>
            <p>Система анализа фармакологических рисков</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">Дашборд</button>
            <button class="tab-btn" data-tab="stack">Стек</button>
            <button class="tab-btn" data-tab="settings">Настройки</button>
        </nav>

        <!-- Вкладка Дашборд -->
        <div id="dashboard" class="tab-content active">
            <h2>Общая сводка</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Препаратов</h3>
                    <span id="total-drugs">0</span>
                </div>
                <div class="stat-card">
                    <h3>Общий риск</h3>
                    <span id="total-risk" class="risk-low">0%</span>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="riskChart"></canvas>
            </div>
        </div>

        <!-- Вкладка Стек -->
        <div id="stack" class="tab-content">
            <h2>Управление стеком</h2>
            
            <div class="form-group">
                <h3>Добавить препарат</h3>
                <input type="text" id="drug-name" placeholder="Название препарата">
                <input type="text" id="drug-dose" placeholder="Дозировка (мг/мл)">
                <select id="drug-route">
                    <option value="oral">Перорально</option>
                    <option value="inject">Инъекционно</option>
                    <option value="topical">Местно</option>
                </select>
                <input type="number" id="drug-period" placeholder="Период (дни)" min="1">
                
                <h4>Параметры риска (0-10)</h4>
                <div class="risk-inputs">
                    <label>CV: <input type="number" id="risk-cv" min="0" max="10" value="0"></label>
                    <label>Hep: <input type="number" id="risk-hep" min="0" max="10" value="0"></label>
                    <label>Neuro: <input type="number" id="risk-neuro" min="0" max="10" value="0"></label>
                    <label>Lipid: <input type="number" id="risk-lipid" min="0" max="10" value="0"></label>
                    <label>Nephro: <input type="number" id="risk-nephro" min="0" max="10" value="0"></label>
                    <label>Hemo: <input type="number" id="risk-hemo" min="0" max="10" value="0"></label>
                </div>
                <button id="add-drug-btn" class="btn-primary">Добавить в стек</button>
            </div>

            <div class="stack-list" id="stack-list">
                <!-- Сюда добавляются препараты -->
            </div>

            <div class="actions">
                <button id="calc-risks-btn" class="btn-success">Рассчитать риски</button>
                <button id="clear-stack-btn" class="btn-danger">Очистить стек</button>
            </div>

            <div id="risk-report" class="risk-report" style="display:none;">
                <h3>Отчет по рискам</h3>
                <div id="risk-details"></div>
                <div class="total-toxicity">
                    <h4>Кумулятивный индекс токсичности: <span id="toxicity-score">0</span></h4>
                    <div class="progress-bar"><div id="toxicity-bar" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <!-- Вкладка Настройки -->
        <div id="settings" class="tab-content">
            <h2>Настройки</h2>
            <p>Здесь будут настройки профилей и параметров расчета.</p>
            <button id="export-data" class="btn-primary">Экспорт данных</button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
