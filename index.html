<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bode Health v11.0</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css?v=12">
</head>
<body>
<div class="app-container">
    <header>
        <h1>Bode Health <span style="font-size:0.6em; color:var(--sec)">v11.0</span></h1>
        <div class="xp-badge" id="xp-display">XP: 0</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="App.switchTab('dashboard')">📊 Главная</button>
        <button class="tab-btn" onclick="App.switchTab('stack')">💉 Стек</button>
        <button class="tab-btn" onclick="App.switchTab('risks')">⚠️ Риски</button>
        <button class="tab-btn" onclick="App.switchTab('support')">💊 Поддержка</button>
        <button class="tab-btn" onclick="App.switchTab('labs')">🧬 Анализы</button>
        <button class="tab-btn" onclick="App.switchTab('articles')">📚 Статьи</button>
        <button class="tab-btn" onclick="App.switchTab('shop')">🛒 Магазин</button>
    </nav>

    <main>
        <!-- DASHBOARD -->
        <div id="dashboard" class="view active">
            <div class="grid">
                <div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div>
                <div class="card"><h3>Avg Risk</h3><div class="big-val" id="d-risk">--</div></div>
            </div>
            <div class="form-box" style="border:1px solid var(--err); color:var(--err); text-align:center;">
                ⚠️ Добавьте препараты во вкладке "Стек" для расчета прогноза.
            </div>
        </div>

        <!-- STACK -->
        <div id="stack" class="view">
            <div class="form-box">
                <label>Вещество</label>
                <select id="sub-select" onchange="App.loadEsters()"></select>
                
                <label>Эфир</label>
                <select id="est-select" disabled></select>
                
                <div class="row">
                    <input type="number" id="in-dose" placeholder="Доза (мг/нед)" inputmode="decimal">
                </div>
                <div class="row">
                    <input type="number" id="in-start" placeholder="Старт (нед)" value="1" inputmode="numeric">
                    <input type="number" id="in-end" placeholder="Финиш (нед)" value="8" inputmode="numeric">
                </div>
                <button class="btn-pri" onclick="App.addDrug()">Добавить в курс</button>
            </div>
            <div id="stack-list"></div>
            <button class="btn-sec" onclick="App.calcPlan()">РАССЧИТАТЬ ДИНАМИКУ</button>
            <div id="plan-msg" class="mt-2 text-center" style="color:var(--sec)"></div>
        </div>

        <!-- RISKS -->
        <div id="risks" class="view">
            <h3 style="margin-top:0">Динамика рисков</h3>
            <div class="controls" id="chart-controls"></div>
            <div style="height:300px; width:100%"><canvas id="trend-chart"></canvas></div>
            
            <h3>Матрица (Heatmap)</h3>
            <div class="week-nav">
                <button onclick="App.changeWeek(-1)">◀</button>
                <span id="week-label" style="font-weight:bold; color:var(--sec); min-width:100px; text-align:center">Неделя 1</span>
                <button onclick="App.changeWeek(1)">▶</button>
            </div>
            <div id="heatmap" class="heatmap"></div>
        </div>

        <!-- SUPPORT -->
        <div id="support" class="view">
            <h2 style="margin-top:0">Протокол поддержки</h2>
            <div id="support-list"></div>
        </div>

        <!-- LABS -->
        <div id="labs" class="view">
            <div class="form-box">
                <h3 style="margin-top:0; color:var(--sec)">Индекс Фертильности (WHO)</h3>
                <label>Объем (мл)</label>
                <input type="number" id="lab-vol" placeholder="1.5 - 5.0" inputmode="decimal">
                <label>Концентрация (млн/мл)</label>
                <input type="number" id="lab-conc" placeholder="15 - 200" inputmode="decimal">
                <label>Подвижность PR (%)</label>
                <input type="number" id="lab-pr" placeholder="30 - 90" inputmode="decimal">
                <button class="btn-pri" onclick="App.calcFert()">Рассчитать IF</button>
                <div id="fert-res" style="margin-top:20px; text-align:center"></div>
            </div>
        </div>

        <!-- ARTICLES -->
        <div id="articles" class="view">
            <h2 style="margin-top:0">База знаний</h2>
            <div id="articles-list"></div>
        </div>

        <!-- SHOP -->
        <div id="shop" class="view">
            <h2 style="margin-top:0">Магазин</h2>
            <div id="shop-list"></div>
            <h2>Глоссарий</h2>
            <div id="glossary-list"></div>
        </div>
    </main>
</div>

<script src="assets/js/core/database.js?v=12"></script>
<script src="assets/js/core/engine.js?v=12"></script>
<script src="assets/js/app.js?v=12"></script>
</body>
</html>
