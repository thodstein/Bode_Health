<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bode Health v12.0 Modular</title>
<base href="https://thodstein.github.io/Bode_Health/">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="assets/css/style.css?v=15">
<style>
/* Минимальные стили для гарантии отображения, основные в style.css */
:root{--bg:#121212;--card:#1e1e1e;--pri:#bb86fc;--sec:#03dac6;--err:#cf6679;--txt:#fff;--bor:#333}
body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--txt)}
.view{display:none;padding:20px}.view.active{display:block}
.tabs{display:flex;overflow-x:auto;background:var(--card);position:sticky;top:0;z-index:100}
.tab-btn{flex:0 0 auto;padding:15px;background:none;border:none;color:#888;cursor:pointer}
.tab-btn.active{color:var(--sec);border-bottom:2px solid var(--sec)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.card{background:var(--card);padding:20px;border-radius:12px;text-align:center}
.big-val{font-size:1.8rem;font-weight:bold;color:var(--sec)}
.form-box{background:var(--card);padding:20px;border-radius:12px;margin:20px 0}
input,select{width:100%;background:#2c2c2c;border:1px solid var(--bor);color:#fff;padding:10px;margin:5px 0}
button{width:100%;padding:12px;background:var(--pri);border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-sec{background:var(--sec);color:#000;margin-top:10px}
.item{background:var(--card);padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid var(--sec)}
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:5px}
.hm-cell{padding:5px;text-align:center;font-size:0.7rem;border-radius:4px;color:#fff}
</style>
</head>
<body>
<div class="app">
<header style="background:var(--card);padding:15px;display:flex;justify-content:space-between"><h1>Bode Health</h1><span id="xp-display">XP:0</span></header>
<nav class="tabs">
<button class="tab-btn active" onclick="App.switchTab('dashboard')">📊 Главная</button>
<button class="tab-btn" onclick="App.switchTab('stack')">💉 Стек</button>
<button class="tab-btn" onclick="App.switchTab('risks')">⚠️ Риски</button>
<button class="tab-btn" onclick="App.switchTab('support')">💊 Поддержка</button>
<button class="tab-btn" onclick="App.switchTab('labs')">🧬 Анализы</button>
<button class="tab-btn" onclick="App.switchTab('articles')">📚 Статьи</button>
<button class="tab-btn" onclick="App.switchTab('shop')">🛒 Магазин</button>
<button class="tab-btn" onclick="App.switchTab('profile')">👤 Профиль</button>
</nav>
<main>
<div id="dashboard" class="view active"><div class="grid"><div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div><div class="card"><h3>Risk</h3><div class="big-val" id="d-risk">--</div></div></div></div>
<div id="stack" class="view">
<div class="form-box">
<select id="sub-select" onchange="App.loadEsters()"></select>
<select id="est-select" disabled></select>
<input type="number" id="in-dose" placeholder="Доза">
<div style="display:flex;gap:10px"><input type="number" id="in-start" value="1" placeholder="Старт"><input type="number" id="in-end" value="8" placeholder="Финиш"></div>
<button onclick="App.addDrug()">Добавить</button>
</div>
<div id="stack-list"></div>
<button class="btn-sec" onclick="App.calcPlan()">РАССЧИТАТЬ</button>
<div id="plan-msg"></div>
</div>
<div id="risks" class="view"><canvas id="trend-chart"></canvas><div id="chart-controls"></div><div class="week-nav" style="display:flex;justify-content:center;gap:20px;margin:20px 0"><button onclick="App.changeWeek(-1)" style="width:auto">◀</button><span id="week-label">Неделя 1</span><button onclick="App.changeWeek(1)" style="width:auto">▶</button></div><div id="heatmap" class="heatmap"></div></div>
<div id="support" class="view"><div id="support-list"></div></div>
<div id="labs" class="view"><div class="form-box"><input type="number" id="lab-vol" placeholder="Объем"><input type="number" id="lab-conc" placeholder="Конц"><button class="btn-sec" onclick="App.calcFert()">Рассчитать IF</button><div id="fert-res"></div></div></div>
<div id="articles" class="view"><div id="articles-list"></div></div>
<div id="shop" class="view"><div id="shop-list"></div><div id="glossary-list"></div></div>
<div id="profile" class="view"><div class="card"><h3>Профиль</h3><p>XP: <span id="prof-xp">0</span></p><p>Trust: <span id="prof-trust">0</span></p></div></div>
</main>
</div>
<!-- ПОДКЛЮЧЕНИЕ МОДУЛЕЙ -->
<script src="assets/js/core/database.js?v=15"></script>
<script src="assets/js/core/engine.js?v=15"></script>
<script src="assets/js/app.js?v=15"></script>
</body>
</html>
