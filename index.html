<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bode Health v11</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Bode Health <span class="version">v11.0</span></h1>
            <p id="user-status">Готов к работе</p>
        </header>

        <!-- Навигация -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="stack">💉 Стек</button>
            <button class="tab-btn" data-tab="support">💊 Поддержка</button>
            <button class="tab-btn" data-tab="risks">⚠️ Риски</button>
            <button class="tab-btn" data-tab="nutrition">🍎 Питание</button>
            <button class="tab-btn" data-tab="training">🏋️ Тренировки</button>
            <button class="tab-btn" data-tab="labs">🧬 Анализы</button>
        </nav>

        <!-- Контент -->
        <main>
            <!-- Вкладка СТЕК -->
            <section id="stack" class="tab-content active">
                <div class="card">
                    <h2>Добавить препарат</h2>
                    <form id="add-drug-form">
                        <input type="text" id="drug-search" placeholder="Поиск препарата (напр. DHB, Тестостерон)..." list="drug-list">
                        <datalist id="drug-list"></datalist>
                        
                        <div class="form-row">
                            <input type="text" id="drug-dose" placeholder="Доза (мг/нед или мг/день)">
                            <select id="drug-route">
                                <option value="inject">Инъекционно</option>
                                <option value="oral">Перорально</option>
                                <option value="topical">Местно</option>
                                <option value="peptide">Пептиды (п/к)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary">Добавить в стек</button>
                    </form>
                </div>
                <div id="active-stack" class="drug-list"></div>
                <div class="actions">
                    <button id="calc-risks-btn" class="btn-success">Рассчитать риски и поддержку</button>
                    <button id="clear-stack-btn" class="btn-danger">Очистить стек</button>
                </div>
            </section>

            <!-- Вкладка ПОДДЕРЖКА -->
            <section id="support" class="tab-content">
                <div id="support-plan" class="support-grid"></div>
                <div id="synergy-block" class="card synergy"></div>
            </section>

            <!-- Вкладка РИСКИ -->
            <section id="risks" class="tab-content">
                <div class="risk-summary">
                    <canvas id="risk-chart"></canvas>
                    <div id="risk-text"></div>
                </div>
                <div id="risk-matrix" class="risk-matrix"></div>
            </section>

            <!-- Вкладка ПИТАНИЕ -->
            <section id="nutrition" class="tab-content">
                <div class="card">
                    <h2>Дневник питания</h2>
                    <div class="voice-input">
                        <button id="voice-btn" class="btn-icon">🎙️</button>
                        <input type="text" id="food-input" placeholder="Что съели? (или нажмите микрофон)">
                    </div>
                    <div id="food-log"></div>
                </div>
            </section>

            <!-- Вкладка ТРЕНИРОВКИ -->
            <section id="training" class="tab-content">
                <div class="card">
                    <h2>План тренировок</h2>
                    <p id="training-recs">Заполните стек для генерации плана.</p>
                </div>
            </section>

            <!-- Вкладка АНАЛИЗЫ -->
            <section id="labs" class="tab-content">
                <div class="card">
                    <h2>Фертильность (WHO 2021)</h2>
                    <input type="number" id="sperm-count" placeholder="Концентрация (млн/мл)">
                    <input type="number" id="sperm-motility" placeholder="Подвижность (%)">
                    <button id="calc-fertility" class="btn-primary">Рассчитать индекс фертильности</button>
                    <div id="fertility-result"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Подключаем модули последовательно -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
