<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health v11</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --pri: #bb86fc; --sec: #03dac6; --err: #cf6679; --txt: #fff; --bor: #333; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--txt); padding-bottom: 80px; }
        .app { max-width: 900px; margin: 0 auto; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--bor); }
        h1 { margin: 0; font-size: 1.2rem; color: var(--pri); }
        .tabs { display: flex; overflow-x: auto; background: var(--card); position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 0 0 auto; padding: 15px; background: none; border: none; color: #888; font-weight: bold; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-btn.active { color: var(--sec); border-bottom-color: var(--sec); }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--bor); }
        .big-val { font-size: 1.8rem; font-weight: bold; color: var(--sec); margin-top: 5px; }
        .form-box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { width: 100%; background: #2c2c2c; border: 1px solid var(--bor); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--pri); color: #000; }
        .btn-sec { background: var(--sec); margin-top: 10px; }
        .btn-del { background: rgba(207,102,121,0.2); color: var(--err); width: auto; padding: 5px 10px; }
        .item { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--sec); display: flex; justify-content: space-between; }
        .time-block { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .time-block h3 { color: var(--pri); margin: 0 0 10px; font-size: 0.9rem; text-transform: uppercase; }
        .heatmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; margin-top: 15px; }
        .hm-cell { padding: 8px; border-radius: 4px; text-align: center; font-size: 0.75rem; color: #fff; }
        .week-nav { display: flex; justify-content: center; gap: 20px; margin: 20px 0; align-items: center; }
        .week-nav button { width: auto; background: #333; color: #fff; padding: 5px 15px; }
        canvas { background: var(--card); border-radius: 12px; padding: 10px; margin-bottom: 20px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 8px; }
        .controls label { display: flex; align-items: center; gap: 5px; color: #fff; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="app">
    <header><h1>Bode Health v11</h1><div id="xp-display" style="color:var(--pri);font-weight:bold">XP: 0</div></header>
    <nav class="tabs">
        <button class="tab-btn active" onclick="App.switchTab('dashboard')">Dashboard</button>
        <button class="tab-btn" onclick="App.switchTab('stack')">Stack</button>
        <button class="tab-btn" onclick="App.switchTab('risks')">Risks</button>
        <button class="tab-btn" onclick="App.switchTab('support')">Support</button>
        <button class="tab-btn" onclick="App.switchTab('labs')">Labs</button>
        <button class="tab-btn" onclick="App.switchTab('articles')">Articles</button>
        <button class="tab-btn" onclick="App.switchTab('shop')">Shop</button>
    </nav>
    <main>
        <div id="dashboard" class="view active">
            <div class="grid">
                <div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div>
                <div class="card"><h3>Risk Avg</h3><div class="big-val" id="d-risk">--</div></div>
            </div>
            <div class="form-box" style="border:1px solid var(--err); color:var(--err)">Add drugs in Stack tab to calculate.</div>
        </div>
        <div id="stack" class="view">
            <div class="form-box">
                <label>Substance</label><select id="sub-select" onchange="App.loadEsters()"></select>
                <label>Ester</label><select id="est-select" disabled></select>
                <div class="row"><input type="number" id="in-dose" placeholder="Dose (mg/wk)"></div>
                <div class="row"><input type="number" id="in-start" placeholder="Start Wk" value="1"><input type="number" id="in-end" placeholder="End Wk" value="8"></div>
                <button class="btn-pri" onclick="App.addDrug()">Add Drug</button>
            </div>
            <div id="stack-list"></div>
            <button class="btn-sec" onclick="App.calcPlan()">CALCULATE PLAN</button>
            <div id="plan-msg" style="margin-top:15px; color:var(--sec)"></div>
        </div>
        <div id="risks" class="view">
            <h3>Risk Dynamics</h3>
            <div class="controls" id="chart-controls"></div>
            <canvas id="trend-chart"></canvas>
            <h3>Matrix (Heatmap)</h3>
            <div class="week-nav"><button onclick="App.changeWeek(-1)"><</button><span id="week-label" style="font-weight:bold; color:var(--sec)">Week 1</span><button onclick="App.changeWeek(1)">></button></div>
            <div id="heatmap" class="heatmap"></div>
        </div>
        <div id="support" class="view"><h2>Support Protocol</h2><div id="support-list"></div></div>
        <div id="labs" class="view">
            <div class="form-box"><h3>Fertility Index</h3>
                <input type="number" id="lab-vol" placeholder="Volume (ml)">
                <input type="number" id="lab-conc" placeholder="Conc (mln)">
                <input type="number" id="lab-pr" placeholder="Motility (%)">
                <button class="btn-pri" onclick="App.calcFert()">Calculate IF</button>
                <div id="fert-res" style="margin-top:15px; font-size:1.2rem; font-weight:bold"></div>
            </div>
        </div>
        <div id="articles" class="view"><h2>Articles</h2><div id="articles-list"></div></div>
        <div id="shop" class="view"><h2>Shop</h2><div id="shop-list"></div><h2>Glossary</h2><div id="glossary-list"></div></div>
    </main>
</div>
<script src="assets/js/core/database.js?v=10"></script>
<script src="assets/js/core/engine.js?v=10"></script>
<script src="assets/js/app.js?v=10"></script>
</body>
</html>
