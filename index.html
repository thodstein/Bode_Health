<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bode Health v12.0 Modular</title>
<base href="https://thodstein.github.io/Bode_Health/">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="assets/css/style.css?v=16">
</head>
<body>
<div class="app">
<header><h1>Bode Health</h1><span id="xp-display" style="background:rgba(187,134,252,0.2);color:var(--pri);padding:4px 8px;border-radius:12px;font-size:0.8rem">XP:0</span></header>
<nav class="tabs">
<button class="tab-btn active" onclick="App.switchTab('dashboard')">📊 Главная</button>
<button class="tab-btn" onclick="App.switchTab('stack')">💉 Стек</button>
<button class="tab-btn" onclick="App.switchTab('risks')">⚠️ Риски</button>
<button class="tab-btn" onclick="App.switchTab('support')">💊 Поддержка</button>
<button class="tab-btn" onclick="App.switchTab('labs')">🧬 Анализы</button>
<button class="tab-btn" onclick="App.switchTab('articles')">📚 Статьи</button>
<button class="tab-btn" onclick="App.switchTab('shop')">🛒 Магазин</button>
<button class="tab-btn" onclick="App.switchTab('profile')">👤 Профиль</button>
</nav>
<main>
<div id="dashboard" class="view active"><div class="grid"><div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div><div class="card"><h3>Risk</h3><div class="big-val" id="d-risk">--</div></div></div></div>
<div id="stack" class="view">
<div class="form-box">
<select id="sub-select" onchange="App.loadEsters()"></select>
<select id="est-select" disabled></select>
<input type="number" id="in-dose" placeholder="Доза (мг)">
<div style="display:flex;gap:10px"><input type="number" id="in-start" value="1" placeholder="Старт"><input type="number" id="in-end" value="8" placeholder="Финиш"></div>
<button class="btn-pri" onclick="App.addDrug()">Добавить</button>
</div>
<div id="stack-list"></div>
<button class="btn-sec" onclick="App.calcPlan()">РАССЧИТАТЬ</button>
<div id="plan-msg" style="margin-top:15px;color:var(--sec)"></div>
</div>
<div id="risks" class="view"><canvas id="trend-chart"></canvas><div id="chart-controls"></div><div class="week-nav" style="display:flex;justify-content:center;gap:20px;margin:20px 0"><button onclick="App.changeWeek(-1)">◀</button><span id="week-label" style="font-weight:bold;color:var(--sec)">Неделя 1</span><button onclick="App.changeWeek(1)">▶</button></div><div id="heatmap" class="heatmap"></div></div>
<div id="support" class="view"><div id="support-list"></div></div>
<div id="labs" class="view"><div class="form-box"><input type="number" id="lab-vol" placeholder="Объем"><input type="number" id="lab-conc" placeholder="Конц"><button class="btn-sec" onclick="App.calcFert()">Рассчитать IF</button><div id="fert-res" style="margin-top:15px;font-size:1.2rem;font-weight:bold"></div></div></div>
<div id="articles" class="view"><h2>Статьи</h2><div id="articles-list"></div></div>
<div id="shop" class="view"><h2>Магазин</h2><div id="shop-list"></div><h2>Глоссарий</h2><div id="glossary-list"></div></div>
<div id="profile" class="view"><h2>Профиль</h2><div class="card"><h3>Статистика</h3><p>XP: <span id="prof-xp">0</span></p><p>Trust: <span id="prof-trust">0</span></p></div></div>
</main>
</div>
<script src="assets/js/core/database.js?v=16"></script>
<script src="assets/js/core/engine.js?v=16"></script>
<script src="assets/js/app.js?v=16"></script>
</body>
</html>
