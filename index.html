<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health v11.0</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.v3.css">
</head>
<body>
<div class="app">
    <header><h1>Bode Health</h1><span id="xp-display">XP:0</span></header>
    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Главная</button>
        <button class="tab-btn" onclick="switchTab('stack')">💉 Стек</button>
        <button class="tab-btn" onclick="switchTab('risks')">⚠️ Риски</button>
        <button class="tab-btn" onclick="switchTab('support')">💊 Поддержка</button>
        <button class="tab-btn" onclick="switchTab('labs')">🧬 Анализы</button>
        <button class="tab-btn" onclick="switchTab('nutrition')">🍎 Питание</button>
        <button class="tab-btn" onclick="switchTab('training')">🏋️ Тренировки</button>
        <button class="tab-btn" onclick="switchTab('reports')">📑 Отчеты</button>
        <button class="tab-btn" onclick="switchTab('profile')">👤 Профиль</button>
    </nav>
    <main>
        <div id="dashboard" class="view active"><div class="grid"><div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div><div class="card"><h3>Risk</h3><div class="big-val" id="d-risk">--</div></div></div></div>
        <div id="stack" class="view">
            <div class="form-box">
                <label>Вещество</label><select id="sub-select" onchange="loadEsters()"></select>
                <label>Эфир</label><select id="est-select" disabled></select>
                <div class="row"><input type="number" id="in-dose" placeholder="Доза"></div>
                <div class="row"><input type="number" id="in-start" value="1" placeholder="Старт"><input type="number" id="in-end" value="8" placeholder="Финиш"></div>
                <button onclick="addDrug()">Добавить</button>
            </div>
            <div id="stack-list"></div>
            <button class="btn-sec" style="background:var(--sec);margin-top:10px" onclick="calcPlan()">РАССЧИТАТЬ</button>
            <div id="plan-msg"></div>
        </div>
        <div id="risks" class="view">
            <canvas id="trend-chart"></canvas>
            <div class="week-nav"><button onclick="changeWeek(-1)">◀</button><span id="week-label">Неделя 1</span><button onclick="changeWeek(1)">▶</button></div>
            <div id="heatmap" class="heatmap"></div>
        </div>
        <div id="support" class="view"><div id="support-list"></div></div>
        <div id="labs" class="view"><div class="form-box"><h3>Фертильность</h3><input type="number" id="lab-vol" placeholder="Объем"><input type="number" id="lab-conc" placeholder="Конц"><button onclick="alert('Расчет IF')">OK</button></div></div>
        <div id="nutrition" class="view"><h2>Питание</h2><p>В разработке...</p></div>
        <div id="training" class="view"><h2>Тренировки</h2><p>В разработке...</p></div>
        <div id="reports" class="view"><h2>Отчеты</h2><p>В разработке...</p></div>
        <div id="profile" class="view"><h2>Профиль</h2><p>В разработке...</p></div>
    </main>
</div>
<script src="assets/js/core/database.v3.js"></script>
<script src="assets/js/core/engine.v3.js"></script>
<script src="assets/js/app.v3.js"></script>
</body>
</html>
