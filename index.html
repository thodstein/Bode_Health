<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{background:#121212;color:#fff;font-family:sans-serif;margin:0;padding-bottom:50px}
        .app{max-width:900px;margin:0 auto}
        header{background:#1e1e1e;padding:15px;border-bottom:1px solid #333;display:flex;justify-content:space-between}
        .tabs{display:flex;overflow-x:auto;background:#1e1e1e}
        .tab-btn{flex:1;min-width:100px;padding:15px;background:none;border:none;color:#aaa;font-weight:bold;border-bottom:3px solid transparent;cursor:pointer}
        .tab-btn.active{color:#03dac6;border-bottom-color:#03dac6}
        .view{display:none;padding:20px}
        .view.active{display:block}
        .card{background:#1e1e1e;padding:20px;margin:10px 0;border-radius:8px;border-left:4px solid #03dac6}
        input,select{width:100%;padding:12px;margin:5px 0;background:#2c2c2c;border:1px solid #333;color:#fff;border-radius:4px}
        button{width:100%;padding:14px;background:#bb86fc;color:#000;border:none;border-radius:4px;font-weight:bold;cursor:pointer;margin-top:10px}
        .btn-del{width:auto;padding:5px 10px;background:rgba(207,102,121,0.2);color:#cf6679}
        .item{background:#1e1e1e;padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid #03dac6;display:flex;justify-content:space-between}
        .time-block{background:#252525;padding:15px;margin:15px 0;border-radius:8px}
        .time-block h3{color:#bb86fc;margin:0 0 10px}
        .heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:5px;margin-top:15px}
        .hm-cell{padding:8px;border-radius:4px;text-align:center;font-size:0.8em}
        .week-nav{display:flex;justify-content:center;gap:20px;margin:20px 0}
        .week-nav button{width:auto;background:#333;color:#fff}
        canvas{background:#1e1e1e;border-radius:8px;padding:10px;margin:20px 0}
        .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:15px;background:#1e1e1e;padding:10px;border-radius:8px}
        .controls label{color:#fff;font-size:0.9em}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        .big-val{font-size:2em;font-weight:bold;color:#03dac6}
    </style>
</head>
<body>
<div class="app">
    <header><h1>Bode Health</h1><div id="xp-display">XP:0</div></header>
    <nav class="tabs">
        <button class="tab-btn active" onclick="App.switchTab('dashboard')">Main</button>
        <button class="tab-btn" onclick="App.switchTab('stack')">Stack</button>
        <button class="tab-btn" onclick="App.switchTab('risks')">Risks</button>
        <button class="tab-btn" onclick="App.switchTab('support')">Support</button>
        <button class="tab-btn" onclick="App.switchTab('labs')">Labs</button>
        <button class="tab-btn" onclick="App.switchTab('articles')">Articles</button>
        <button class="tab-btn" onclick="App.switchTab('shop')">Shop</button>
    </nav>
    <div id="dashboard" class="view active">
        <div class="grid">
            <div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div>
            <div class="card"><h3>Risk</h3><div class="big-val" id="d-risk">--</div></div>
        </div>
    </div>
    <div id="stack" class="view">
        <div class="card">
            <label>Substance</label><select id="sub-select" onchange="App.loadEsters()"></select>
            <label>Ester</label><select id="est-select" disabled></select>
            <input type="number" id="in-dose" placeholder="Dose mg/w">
            <div style="display:flex;gap:10px">
                <input type="number" id="in-start" placeholder="Start" value="1">
                <input type="number" id="in-end" placeholder="End" value="8">
            </div>
            <button onclick="App.addDrug()">Add</button>
        </div>
        <div id="stack-list"></div>
        <button onclick="App.calcPlan()" style="background:#03dac6">CALCULATE</button>
        <div id="plan-msg"></div>
    </div>
    <div id="risks" class="view">
        <div class="controls" id="chart-controls"></div>
        <canvas id="trend-chart"></canvas>
        <div class="week-nav">
            <button onclick="App.changeWeek(-1)"><</button>
            <span id="week-label" style="font-weight:bold;color:#03dac6">Week 1</span>
            <button onclick="App.changeWeek(1)">></button>
        </div>
        <div id="heatmap" class="heatmap"></div>
    </div>
    <div id="support" class="view"><div id="support-list"></div></div>
    <div id="labs" class="view">
        <div class="card">
            <input type="number" id="lab-vol" placeholder="Vol">
            <input type="number" id="lab-conc" placeholder="Conc">
            <button onclick="App.calcFert()">Calc IF</button>
            <div id="fert-res"></div>
        </div>
    </div>
    <div id="articles" class="view"><div id="articles-list"></div></div>
    <div id="shop" class="view"><div id="shop-list"></div><div id="glossary-list"></div></div>
</div>
<script src="assets/js/core/database.js"></script>
<script src="assets/js/core/engine.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
