<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bode Health v11.0 Ultimate</title>
  <base href="https://thodstein.github.io/Bode_Health/">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #121212; --card: #1e1e1e; --pri: #bb86fc; --sec: #03dac6; --err: #cf6679; --txt: #fff; --bor: #333; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--txt); padding-bottom: 80px; }
    .app { max-width: 900px; margin: 0 auto; }
    header { background: var(--card); padding: 15px 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--bor); display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 1.2rem; color: var(--pri); }
    .xp-badge { background: rgba(187, 134, 252, 0.2); color: var(--pri); padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
    
    .tabs { display: flex; overflow-x: auto; background: var(--card); position: sticky; top: 60px; z-index: 99; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { flex: 0 0 auto; padding: 15px 20px; background: none; border: none; color: #888; font-weight: 600; font-size: 0.9rem; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; }
    .tab-btn.active { color: var(--sec); border-bottom-color: var(--sec); }
    
    .view { display: none; padding: 20px; animation: fade 0.3s; }
    .view.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--bor); }
    .big-val { font-size: 1.8rem; font-weight: bold; color: var(--sec); margin-top: 5px; }
    
    .form-box { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
    input, select { width: 100%; background: #2c2c2c; border: 1px solid var(--bor); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 1rem; }
    .row { display: flex; gap: 10px; }
    
    button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
    .btn-pri { background: var(--pri); color: #000; }
    .btn-sec { background: var(--sec); color: #000; margin-top: 10px; }
    .btn-delete { background: rgba(207, 102, 121, 0.2); color: var(--err); width: auto; padding: 5px 10px; font-size: 0.8rem; }
    
    .stack-item, .support-item, .article-card, .shop-item, .glossary-item { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--sec); display: flex; justify-content: space-between; align-items: center; }
    .support-block { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .support-block h3 { color: var(--pri); margin: 0 0 10px; font-size: 0.9rem; text-transform: uppercase; }
    .mechanism { font-size: 0.8rem; color: #aaa; }
    
    .heatmap-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; margin-top: 15px; }
    .heatmap-system-header { grid-column: 1 / -1; color: var(--pri); font-weight: bold; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; }
    .heatmap-cell { padding: 8px; border-radius: 4px; text-align: center; font-size: 0.75rem; color: #fff; cursor: help; display: flex; flex-direction: column; justify-content: center; }
    
    .week-nav { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
    .week-nav button { width: auto; padding: 5px 15px; background: #333; color: #fff; }
    
    canvas { background: var(--card); border-radius: 12px; padding: 10px; margin-bottom: 20px; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Bode Health <span style="font-size:0.6em; color:var(--sec)">v11.0</span></h1>
    <div class="xp-badge" id="xp-display">XP: 0</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('dashboard').classList.add('active'); this.classList.add('active')">📊 Главная</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('stack').classList.add('active'); this.classList.add('active')">💉 Стек</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('risks').classList.add('active'); this.classList.add('active'); setTimeout(()=>App.renderRiskChart(), 100)">⚠️ Риски</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('support').classList.add('active'); this.classList.add('active')">💊 Поддержка</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('labs').classList.add('active'); this.classList.add('active')">🧬 Анализы</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('articles').classList.add('active'); this.classList.add('active')">📚 Статьи</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('shop').classList.add('active'); this.classList.add('active')">🛒 Магазин</button>
    <button class="tab-btn" onclick="document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('profile').classList.add('active'); this.classList.add('active')">👤 Профиль</button>
  </nav>

  <main>
    <!-- DASHBOARD -->
    <div id="dashboard" class="view active">
      <div class="grid">
        <div class="card"><h3>Readiness</h3><div class="big-val" id="dash-readiness">--</div></div>
        <div class="card"><h3>Risk Avg</h3><div class="big-val" id="dash-risk">--</div></div>
      </div>
      <div class="form-box" style="border:1px solid var(--err); color:var(--err)">⚠️ Добавьте препараты во вкладке "Стек" для расчета.</div>
    </div>

    <!-- STACK -->
    <div id="stack" class="view">
      <div class="form-box">
        <label>Вещество</label>
        <select id="substance-select" onchange="App.handleSubstanceChange()"></select>
        
        <label>Эфир</label>
        <select id="ester-select" disabled></select>
        
        <div class="row">
          <input type="number" id="drug-dose" placeholder="Доза (мг/нед)">
        </div>
        <div class="row">
          <input type="number" id="drug-start" placeholder="Старт (нед)" value="1">
          <input type="number" id="drug-end" placeholder="Финиш (нед)" value="8">
        </div>
        <button class="btn-pri" onclick="App.addDrugToStack()">Добавить в курс</button>
      </div>
      <div id="stack-list"></div>
      <button class="btn-sec" onclick="App.calculateAndRenderPlan()">РАССЧИТАТЬ ДИНАМИКУ</button>
      <div id="plan-message" style="margin-top:15px; color:var(--sec); text-align:center;"></div>
    </div>

    <!-- RISKS -->
    <div id="risks" class="view">
      <h3>Динамика рисков</h3>
      <div class="controls" id="chart-controls"></div>
      <canvas id="risk-chart"></canvas>
      
      <h3>Матрица (Heatmap)</h3>
      <div class="week-nav">
        <button onclick="App.changeWeek(-1)">◀</button>
        <span id="week-label" style="font-weight:bold; color:var(--sec)">Неделя 1</span>
        <button onclick="App.changeWeek(1)">▶</button>
      </div>
      <div id="heatmap-container" class="heatmap-container"></div>
    </div>

    <!-- SUPPORT -->
    <div id="support" class="view">
      <h2>Протокол поддержки</h2>
      <div id="support-list"></div>
    </div>

    <!-- LABS -->
    <div id="labs" class="view">
      <div class="form-box">
        <h3>Индекс Фертильности (WHO)</h3>
        <input type="number" id="fert-vol" placeholder="Объем (мл)">
        <input type="number" id="fert-conc" placeholder="Концентрация (млн)">
        <button class="btn-pri" onclick="App.calculateFertility()">Рассчитать IF</button>
        <div id="fertility-result" style="margin-top:15px; font-size:1.2rem; font-weight:bold"></div>
      </div>
    </div>

    <!-- ARTICLES -->
    <div id="articles" class="view">
      <h2>База знаний</h2>
      <div id="articles-list"></div>
    </div>

    <!-- SHOP -->
    <div id="shop" class="view">
      <h2>Магазин</h2>
      <div id="shop-list"></div>
      <h2>Глоссарий</h2>
      <div id="glossary-list"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="view">
      <h2>Профиль пользователя</h2>
      <div class="card">
        <h3>Статистика</h3>
        <p>XP: <span id="prof-xp">0</span></p>
        <p>Trust Score: <span id="prof-trust">0</span></p>
      </div>
    </div>
  </main>
</div>

<!-- Подключение модулей -->
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
