<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health - Анализ рисков</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bode Health</h1>
            <p>Система анализа фармакологических рисков</p>
        </header>
        <div class="tabs">
            <button class="tab-btn active" data-tab="input">Ввод данных</button>
            <button class="tab-btn" data-tab="stack">Стек препаратов</button>
            <button class="tab-btn" data-tab="results">Результаты</button>
        </div>
        <div id="input" class="tab-content active">
            <h2>Добавить препарат</h2>
            <form id="drugForm" class="form-grid">
                <input type="text" id="drugName" placeholder="Название препарата" required>
                <input type="text" id="drugDose" placeholder="Дозировка (напр. 50 мг)" required>
                <select id="drugRoute"><option value="oral">Перорально</option><option value="inject">Инъекционно</option><option value="topical">Местно</option></select>
                <input type="text" id="drugPeriod" placeholder="Период (напр. 12 недель)" required>
                <h3>Оценка токсичности (0-10)</h3>
                <div class="sliders">
                    <label>Сердце (CV): <input type="range" id="riskCV" min="0" max="10" value="0"><span id="valCV">0</span></label>
                    <label>Печень (Hep): <input type="range" id="riskHep" min="0" max="10" value="0"><span id="valHep">0</span></label>
                    <label>Невро (Neuro): <input type="range" id="riskNeuro" min="0" max="10" value="0"><span id="valNeuro">0</span></label>
                    <label>Липиды (Lipid): <input type="range" id="riskLipid" min="0" max="10" value="0"><span id="valLipid">0</span></label>
                    <label>Почки (Nephro): <input type="range" id="riskNephro" min="0" max="10" value="0"><span id="valNephro">0</span></label>
                    <label>Кровь (Hemo): <input type="range" id="riskHemo" min="0" max="10" value="0"><span id="valHemo">0</span></label>
                </div>
                <button type="submit" class="btn-primary">Добавить в стек</button>
            </form>
        </div>
        <div id="stack" class="tab-content">
            <h2>Ваш текущий стек</h2>
            <div id="stackList" class="drug-list"></div>
            <div class="actions">
                <button id="calcRiskBtn" class="btn-success">Рассчитать риски</button>
                <button id="clearStackBtn" class="btn-danger">Очистить всё</button>
            </div>
            <div id="riskSummary" class="risk-summary" style="display:none;">
                <h3>Итоговый профиль токсичности</h3>
                <canvas id="riskChart"></canvas>
                <div id="totalScore" class="total-score"></div>
            </div>
        </div>
        <div id="results" class="tab-content">
            <h2>Детальный отчет</h2>
            <div id="reportContent"></div>
        </div>
    </div>
    <script src="assets/js/app.js"></script>
</body>
</html>
