<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health v11.0 Ultimate</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --pri: #bb86fc; --sec: #03dac6; --err: #cf6679; --txt: #fff; --bor: #333; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--txt); padding-bottom: 60px; }
        .app-container { max-width: 900px; margin: 0 auto; }
        header { background: var(--card); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bor); position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; font-size: 1.5rem; }
        .tabs { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--bor); scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 1; min-width: 100px; padding: 15px; background: none; border: none; color: #aaa; font-weight: 600; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--pri); border-bottom-color: var(--pri); }
        .tab-content { display: none; padding: 20px; animation: fade 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--bor); }
        .big-value { font-size: 2rem; font-weight: bold; color: var(--sec); margin-top: 10px; }
        
        form { background: var(--card); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; }
        input, select { background: #2c2c2c; border: 1px solid var(--bor); color: #fff; padding: 12px; border-radius: 8px; flex: 1; font-size: 1rem; }
        button { padding: 14px; background: var(--pri); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-success { background: var(--sec); width: 100%; margin-top: 10px; }
        .btn-delete { background: rgba(207, 102, 121, 0.2); color: var(--err); padding: 8px 12px; font-size: 0.9rem; width: auto; display: inline-block; }
        
        .list-item { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--sec); display: flex; justify-content: space-between; align-items: center; }
        .time-block { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .time-block h3 { color: var(--pri); margin: 0 0 10px; font-size: 0.9rem; text-transform: uppercase; }
        
        .heatmap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; margin-top: 15px; }
        .heatmap-cell { padding: 10px; border-radius: 6px; text-align: center; font-size: 0.75rem; cursor: help; color: #000; font-weight: bold; }
        
        .chart-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 8px; }
        .chart-controls label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer; }
        .week-selector { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .week-selector button { padding: 5px 15px; width: auto; font-size: 1.2rem; }
        #week-display { font-size: 1.2rem; font-weight: bold; color: var(--sec); min-width: 120px; text-align: center; }
        
        canvas { background: var(--card); border-radius: 12px; padding: 10px; max-width: 100%; }
        .empty { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h1>Bode Health <span style="font-size:0.6em; color:var(--sec)">v11.0</span></h1>
        <div id="xp-display" style="color:var(--pri); font-weight:bold;">XP: 0</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="App.switchTab('dashboard')">📊 Главная</button>
        <button class="tab-btn" onclick="App.switchTab('stack')">💉 Стек</button>
        <button class="tab-btn" onclick="App.switchTab('risks')">⚠️ Риски</button>
        <button class="tab-btn" onclick="App.switchTab('support')">💊 Поддержка</button>
        <button class="tab-btn" onclick="App.switchTab('labs')">🧬 Анализы</button>
        <button class="tab-btn" onclick="App.switchTab('articles')">📚 Статьи</button>
        <button class="tab-btn" onclick="App.switchTab('shop')">🛒 Магазин</button>
    </nav>

    <main>
        <!-- DASHBOARD -->
        <section id="dashboard" class="tab-content active">
            <div class="cards-grid">
                <div class="card"><h3>Readiness</h3><div id="dash-readiness" class="big-value">--</div></div>
                <div class="card"><h3>Avg Risk</h3><div id="dash-risk" class="big-value">--</div></div>
            </div>
            <div class="card" style="text-align:left; margin-top:20px;">
                <h3>Статус системы</h3>
                <p id="dash-status">Добавьте препараты во вкладке "Стек" для начала анализа.</p>
            </div>
        </section>

        <!-- STACK -->
        <section id="stack" class="tab-content">
            <h2>Добавить препарат</h2>
            <form onsubmit="App.addDrug(event)">
                <label>Вещество:</label>
                <select id="drug-substance" onchange="App.loadEsters()"></select>
                
                <label>Эфир:</label>
                <select id="drug-ester" disabled></select>
                
                <div class="row">
                    <input type="number" id="drug-dose" placeholder="Доза (мг/нед)" required>
                </div>
                <div class="row">
                    <input type="number" id="drug-start" placeholder="Старт (нед)" value="1" min="1" required>
                    <input type="number" id="drug-end" placeholder="Финиш (нед)" value="8" min="1" required>
                </div>
                <button type="submit">Добавить в курс</button>
            </form>
            <div id="stack-list"></div>
            <button onclick="App.generatePlan()" class="btn-success">Рассчитать динамику курса</button>
            <div id="plan-output" style="margin-top:20px;"></div>
        </section>

        <!-- RISKS -->
        <section id="risks" class="tab-content">
            <h2>Динамика рисков</h2>
            <div class="chart-controls">
                <label><input type="checkbox" checked onchange="App.toggleChart('liver')"> Печень</label>
                <label><input type="checkbox" checked onchange="App.toggleChart('cardio')"> Сердце</label>
                <label><input type="checkbox" checked onchange="App.toggleChart('hemato')"> Кровь</label>
                <label><input type="checkbox" onchange="App.toggleChart('neuro')"> Нейро</label>
                <label><input type="checkbox" onchange="App.toggleChart('kidney')"> Почки</label>
                <label><input type="checkbox" onchange="App.toggleChart('endo')"> Эндо</label>
                <label><input type="checkbox" onchange="App.toggleChart('repro')"> Репро</label>
            </div>
            <canvas id="riskChart"></canvas>
            
            <h2>Матрица рисков (Heatmap)</h2>
            <div class="week-selector">
                <button onclick="App.changeWeek(-1)">◀</button>
                <span id="week-display">Неделя 1</span>
                <button onclick="App.changeWeek(1)">▶</button>
            </div>
            <div id="heatmap" class="heatmap-grid"></div>
        </section>

        <!-- SUPPORT -->
        <section id="support" class="tab-content">
            <h2>Протокол поддержки</h2>
            <div id="support-list"></div>
        </section>

        <!-- LABS -->
        <section id="labs" class="tab-content">
            <h2>Калькулятор фертильности (WHO 2021)</h2>
            <div class="card" style="text-align:left; margin-bottom:20px;">
                <div class="row" style="flex-direction:column; gap:10px;">
                    <input type="number" id="lab-vol" placeholder="Объем (мл)">
                    <input type="number" id="lab-conc" placeholder="Концентрация (млн/мл)">
                    <input type="number" id="lab-pr" placeholder="Подвижность PR (%)">
                </div>
                <button onclick="App.calcFertility()" class="btn-success" style="margin-top:15px;">Рассчитать индекс (IF)</button>
            </div>
            <div id="fert-result"></div>
        </section>

        <!-- ARTICLES -->
        <section id="articles" class="tab-content">
            <h2>База знаний</h2>
            <div id="articles-list"></div>
        </section>

        <!-- SHOP -->
        <section id="shop" class="tab-content">
            <h2>Магазин поддержки</h2>
            <div id="shop-list"></div>
            <h2 style="margin-top:30px;">Глоссарий</h2>
            <div id="glossary-list"></div>
        </section>
    </main>
</div>

// --- 2. ENGINE ---
const Engine = {
    calcConc: function(hl, start, end, week) {
        if(week < start) return 0;
        let onTime = week - start;
        if(week <= end) return Math.min(1, onTime / (hl/7 + 1));
        let offTime = week - end;
        return Math.max(0, 1 - (offTime * 0.2));
    },
    genPlan: function(stack) {
        let maxW = 12;
        stack.forEach(s => { if(s.end > maxW) maxW = s.end; });
        let total = maxW + 6;
        let plan = [];
        for(let w=1; w<=total; w++) {
            let r = {};
            for(let sys in DB.riskMatrix) {
                r[sys] = {};
                DB.riskMatrix[sys].forEach(m => r[sys][m.id] = 0);
            }
            stack.forEach(it => {
                let est = DB.esters[it.sub]?.find(e => e.id === it.est);
                let hl = est ? est.hl : 1;
                let conc = this.calcConc(hl, it.start, it.end, w);
                if(conc > 0.05) {
                    let sub = DB.substances.find(s => s.id === it.sub);
                    if(!sub) return;
                    let load = conc * (it.dose/100);
                    let t = sub.baseTox;
                    r.liver.cholestasis += t.liver*3*load; r.liver.cytolysis += t.liver*2*load;
                    r.cardio.lipids += t.lipid*3*load; r.cardio.htn += t.lipid*1.5*load;
                    r.hemato.erythrocytosis += t.hct*4*load; r.hemato.viscosity += t.hct*3*load;
                    r.neuro.dopamine += t.neuro*5*load;
                    r.kidney.hyperfiltration += t.kidney*3*load;
                    r.endo.insulin_res += t.endo*3*load; r.endo.estrogen += t.endo*2*load;
                    r.repro.suppression += t.repro*5*load; r.repro.atrophy += t.repro*4*load;
                }
            });
            for(let sys in r) for(let k in r[sys]) r[sys][k] = Math.min(100, Math.round(r[sys][k]));
            plan.push({w:w, r:r});
        }
        return plan;
    },
    getColor: function(v) { return v<20?'#4caf50':v<40?'#8bc34a':v<60?'#ffeb3b':v<80?'#ff9800':'#f44336'; }
};

// --- 3. APP LOGIC (GLOBAL SCOPE) ---
const App = {
    state: { stack:[], plan:[], wIdx:0, charts:{liver:true, cardio:true, hemato:true} },
    
    init: function() {
        // Fill Select
        let sel = document.getElementById('drug-substance');
        sel.innerHTML = '';
        DB.substances.forEach(s => {
            let o = document.createElement('option'); o.value=s.id; o.textContent=s.name; sel.appendChild(o);
        });
        this.renderSupport();
        this.renderArticles();
        this.renderShop();
        this.renderGlossary();
    },

    switchTab: function(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    },

    loadEsters: function() {
        let subId = document.getElementById('drug-substance').value;
        let estSel = document.getElementById('drug-ester');
        estSel.innerHTML = '';
        let esters = DB.esters[subId];
        if(esters && esters.length) {
            estSel.disabled = false;
            esters.forEach(e => {
                let o = document.createElement('option'); o.value=e.id; o.textContent=e.name+' ('+e.hl+'д)'; estSel.appendChild(o);
            });
        } else { estSel.disabled = true; }
    },

    addDrug: function(e) {
        e.preventDefault();
        let sub = document.getElementById('drug-substance').value;
        let est = document.getElementById('drug-ester').value;
        let dose = parseFloat(document.getElementById('drug-dose').value);
        let start = parseInt(document.getElementById('drug-start').value);
        let end = parseInt(document.getElementById('drug-end').value);
        if(start >= end) return alert('Финиш должен быть больше старта!');
        this.state.stack.push({sub:sub, est:est, dose:dose, start:start, end:end});
        this.renderStack();
        e.target.reset();
        document.getElementById('drug-ester').disabled = true;
        document.getElementById('drug-start').value = 1;
        document.getElementById('drug-end').value = 8;
    },

    renderStack: function() {
        let list = document.getElementById('stack-list');
        list.innerHTML = '';
        this.state.stack.forEach((it, idx) => {
            let sub = DB.substances.find(s=>s.id===it.sub);
            let est = DB.esters[it.sub]?.find(e=>e.id===it.est);
            list.innerHTML += `<div class="list-item"><div><b>${sub.name}</b> ${est?'('+est.name+)':''}<br>${it.dose}мг | Недели ${it.start}-${it.end}</div><button class="btn-delete" onclick="App.state.stack.splice(${idx},1); App.renderStack()">✕</button></div>`;
        });
    },

    generatePlan: function() {
        this.state.plan = Engine.genPlan(this.state.stack);
        this.state.wIdx = 0;
        this.renderHeatmap();
        this.renderChart();
        let out = document.getElementById('plan-output');
        out.innerHTML = `<div class="card" style="border-left:4px solid var(--sec)"><h3>Курс рассчитан</h3><p>Длительность: ${this.state.plan.length} недель (включая выведение).</p></div>`;
        let avg = 0, cnt=0; 
        for(let s in this.state.plan[0].r) for(let k in this.state.plan[0].r[s]) { avg+=this.state.plan[0].r[s][k]; cnt++; }
        document.getElementById('dash-risk').textContent = Math.round(avg/cnt) + '%';
        document.getElementById('dash-readiness').textContent = Math.max(10, 100 - Math.round(avg/cnt));
        document.getElementById('dash-status').textContent = "Активных препаратов: " + this.state.stack.length + ". Требуется мониторинг.";
        document.getElementById('xp-display').textContent = "XP: " + (parseInt(document.getElementById('xp-display').innerText.split(':')[1]) + 100);
    },

    changeWeek: function(dir) {
        if(!this.state.plan.length) return;
        this.state.wIdx += dir;
        if(this.state.wIdx < 0) this.state.wIdx = 0;
        if(this.state.wIdx >= this.state.plan.length) this.state.wIdx = this.state.plan.length-1;
        this.renderHeatmap();
    },

    toggleChart: function(sys) { this.state.charts[sys] = !this.state.charts[sys]; this.renderChart(); },

    renderHeatmap: function() {
        if(!this.state.plan.length) return;
        let d = this.state.plan[this.state.wIdx];
        document.getElementById('week-display').textContent = 'Неделя ' + d.w;
        let cont = document.getElementById('heatmap'); cont.innerHTML = '';
        for(let sys in DB.riskMatrix) {
            cont.innerHTML += `<div style="grid-column:1/-1; color:var(--pri); font-weight:bold; margin-top:10px; text-align:left">${sys.toUpperCase()}</div>`;
            DB.riskMatrix[sys].forEach(m => {
                let val = d.r[sys][m.id] || 0;
                let cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                cell.style.backgroundColor = Engine.getColor(val);
                cell.style.color = val>50?'#000':'#fff';
                cell.innerHTML = `<div>${m.n}</div><div>${val}%</div>`;
                cont.appendChild(cell);
            });
        }
    },

    renderChart: function() {
        let ctx = document.getElementById('riskChart');
        if(!ctx || !this.state.plan.length) return;
        if(window.myChart) window.myChart.destroy();
        let labels = this.state.plan.map(p => 'W'+p.w);
        let datasets = [];
        let colors = {liver:'#ff6384', cardio:'#36a2eb', hemato:'#ff9f40', neuro:'#9966ff', kidney:'#4bc0c0', endo:'#c9cbcf', repro:'#e7e9ed'};
        for(let sys in this.state.charts) {
            if(this.state.charts[sys]) {
                let data = this.state.plan.map(p => {
                    let sum=0, cnt=0;
                    for(let k in p.r[sys]) { sum+=p.r[sys][k]; cnt++; }
                    return cnt ? Math.round(sum/cnt) : 0;
                });
                datasets.push({label:sys.toUpperCase(), data:data, borderColor:colors[sys], borderWidth:2, fill:false, tension:0.4});
            }
        }
        window.myChart = new Chart(ctx, {
            type: 'line',
             { labels:labels, datasets:datasets },
            options: { responsive:true, plugins:{legend:{labels:{color:'#aaa'}}}, scales:{y:{beginAtZero:true, max:100, ticks:{color:'#aaa'}, grid:{color:'#333'}}, x:{ticks:{color:'#aaa'}, grid:{color:'#333'}}} }
        });
    },

    renderSupport: function() {
        let list = document.getElementById('support-list'); list.innerHTML = '';
        DB.support.forEach(b => {
            list.innerHTML += `<div class="time-block"><h3>${b.t}</h3>` + b.items.map(i => `<div class="list-item" style="margin:5px 0; padding:10px;"><div><b>${i.n}</b> ${i.d}<br><small style="color:#aaa">${i.m}</small></div></div>`).join('') + `</div>`;
        });
    },

    calcFertility: function() {
        let v = parseFloat(document.getElementById('lab-vol').value)||0;
        let c = parseFloat(document.getElementById('lab-conc').value)||0;
        let pr = parseFloat(document.getElementById('lab-pr').value)||0;
        let score = Math.round((Math.min(1,v/1.5)*20) + (Math.min(1,c/16)*30) + (Math.min(1,pr/30)*30));
        let resDiv = document.getElementById('fert-result');
        resDiv.innerHTML = `<div class="card"><h3>Индекс фертильности (IF): ${score}/100</h3><p>${score>60?'✅ Норма':score>30?'⚠️ Умеренное снижение':'🔴 Критическое снижение'}</p></div>`;
    },

    renderArticles: function() {
        let list = document.getElementById('articles-list'); list.innerHTML = '';
        DB.articles.forEach(a => {
            list.innerHTML += `<div class="list-item"><div><b>${a.t}</b><br><small style="color:#aaa">${a.c} | 👁 ${a.v}</small></div><button style="padding:5px 10px; width:auto; font-size:0.8em">Читать</button></div>`;
        });
    },

    renderShop: function() {
        let list = document.getElementById('shop-list'); list.innerHTML = '';
        for(let k in DB.shop) {
            DB.shop[k].forEach(i => {
                list.innerHTML += `<div class="list-item"><div><b>${k.toUpperCase()}</b><br><small>${i.p}</small></div><div style="color:var(--sec); font-weight:bold">${i.pr}</div></div>`;
            });
        }
    },

    renderGlossary: function() {
        let list = document.getElementById('glossary-list'); list.innerHTML = '';
        for(let k in DB.glossary) {
            list.innerHTML += `<div class="list-item"><b>${k}</b><p style="margin:5px 0 0; font-size:0.9em; color:#aaa">${DB.glossary[k]}</p></div>`;
        }
    }
};

// Start
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
