<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Health v11.0</title>
    <base href="https://thodstein.github.io/Bode_Health/">
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bode Health <span style="font-size:12px; opacity:0.7">v11.0 Ultimate</span></h1>
            <p>Система анализа фармакологических рисков и поддержки</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="stack">💉 Стек</button>
            <button class="tab-btn" data-tab="support">💊 Поддержка</button>
            <button class="tab-btn" data-tab="risks">📊 Риски</button>
            <button class="tab-btn" data-tab="nutrition">🍎 Питание</button>
            <button class="tab-btn" data-tab="labs">🧬 Анализы</button>
            <button class="tab-btn" data-tab="training">🏋️ Тренировки</button>
        </nav>

        <!-- Вкладка СТЕК -->
        <div id="stack" class="tab-content active">
            <h2>Управление стеком</h2>
            <form id="drugForm" class="form-grid">
                <select id="drugSelect" required><option value="">Выберите препарат...</option></select>
                <input type="text" id="drugDose" placeholder="Доза (напр. 300 мг/нед)" required>
                <input type="number" id="drugWeeks" placeholder="Длительность (нед)" value="12">
                <button type="submit" class="btn-primary">Добавить в стек</button>
            </form>
            <div id="stackList" class="drug-list"></div>
            <div class="actions">
                <button id="calcRiskBtn" class="btn-success">🔄 Пересчитать риски</button>
                <button id="clearStackBtn" class="btn-danger">🗑 Очистить</button>
            </div>
        </div>

        <!-- Вкладка ПОДДЕРЖКА -->
        <div id="support" class="tab-content">
            <h2>Протокол поддержки</h2>
            <div id="supportSchedule"></div>
            <div id="synergyBlock" class="synergy-block"></div>
        </div>

        <!-- Вкладка РИСКИ -->
        <div id="risks" class="tab-content">
            <h2>Карта рисков (Raw vs Net)</h2>
            <canvas id="riskChart"></canvas>
            <div id="riskDetails" class="risk-details"></div>
        </div>

        <!-- Вкладка ПИТАНИЕ -->
        <div id="nutrition" class="tab-content">
            <h2>Дневник питания</h2>
            <div class="voice-input">
                <button id="voiceBtn" class="btn-mic">🎙️ Голосовой ввод</button>
                <span id="voiceStatus"></span>
            </div>
            <input type="text" id="foodSearch" placeholder="Поиск продукта или штрихкод...">
            <div id="foodResults"></div>
            <div id="dailySummary"></div>
        </div>

        <!-- Вкладка АНАЛИЗЫ -->
        <div id="labs" class="tab-content">
            <h2>Лабораторные данные</h2>
            <button class="btn-secondary" onclick="alert('Функция OCR в разработке')">📷 Загрузить фото анализов</button>
            <div id="labResults"></div>
            <div id="fertilityIndex" class="fertility-card"></div>
        </div>

        <!-- Вкладка ТРЕНИРОВКИ -->
        <div id="training" class="tab-content">
            <h2>Программа тренировок</h2>
            <div id="workoutPlan"></div>
        </div>
    </div>

    <script src="assets/js/core/constants.js"></script>
    <script src="assets/js/core/utils.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/modules/drugs.js"></script>
    <script src="assets/js/modules/support.js"></script>
    <script src="assets/js/modules/risks.js"></script>
    <script src="assets/js/modules/nutrition.js"></script>
    <script src="assets/js/modules/labs.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
