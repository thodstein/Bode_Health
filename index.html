<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bode Health v14.0 Fresh Start</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app">
<header><h1>Bode Health <span style="font-size:0.6em;color:var(--sec)">v14.0</span></h1><div class="xp-badge" id="xp-display">XP: 0</div></header>
<nav class="tabs">
<button class="tab-btn active" onclick="App.switchTab('dashboard')">📊 Главная</button>
<button class="tab-btn" onclick="App.switchTab('stack')">💉 Стек</button>
<button class="tab-btn" onclick="App.switchTab('risks')">⚠️ Риски</button>
<button class="tab-btn" onclick="App.switchTab('support')">💊 Поддержка</button>
<button class="tab-btn" onclick="App.switchTab('labs')">🧬 Анализы</button>
<button class="tab-btn" onclick="App.switchTab('articles')">📚 Статьи</button>
<button class="tab-btn" onclick="App.switchTab('shop')">🛒 Магазин</button>
<button class="tab-btn" onclick="App.switchTab('profile')">👤 Профиль</button>
</nav>
<main>
<div id="dashboard" class="view active"><div class="grid"><div class="card"><h3>Readiness</h3><div class="big-val" id="d-readiness">--</div></div><div class="card"><h3>Risk Avg</h3><div class="big-val" id="d-risk">--</div></div></div></div>
<div id="stack" class="view"><div class="form-box"><label>Вещество</label><select id="sub-select" onchange="App.loadEsters()"></select><label>Эфир</label><select id="est-select" disabled></select><div class="row"><input type="number" id="in-dose" placeholder="Доза (мг/нед)"></div><div class="row"><input type="number" id="in-start" placeholder="Старт (нед)" value="1"><input type="number" id="in-end" placeholder="Финиш (нед)" value="8"></div><button class="btn-pri" onclick="App.addDrug()">Добавить в курс</button></div><div id="stack-list"></div><button class="btn-sec" onclick="App.calcPlan()">РАССЧИТАТЬ ДИНАМИКУ</button><div id="plan-msg" style="margin-top:15px;color:var(--sec)"></div></div>
<div id="risks" class="view"><h3>Динамика рисков</h3><div class="controls" id="chart-controls"></div><canvas id="trend-chart"></canvas><h3>Матрица (Heatmap)</h3><div class="week-nav"><button onclick="App.changeWeek(-1)">◀</button><span id="week-label" style="font-weight:bold;color:var(--sec)">Неделя 1</span><button onclick="App.changeWeek(1)">▶</button></div><div id="heatmap" class="heatmap"></div></div>
<div id="support" class="view"><h2>Протокол поддержки</h2><div id="support-list"></div></div>
<div id="labs" class="view"><div class="form-box"><h3>Индекс Фертильности (WHO)</h3><input type="number" id="lab-vol" placeholder="Объем (мл)"><input type="number" id="lab-conc" placeholder="Концентрация (млн)"><input type="number" id="lab-pr" placeholder="Подвижность (%)"><button class="btn-pri" onclick="App.calcFert()">Рассчитать IF</button><div id="fert-res" style="margin-top:15px;font-size:1.2rem;font-weight:bold"></div></div></div>
<div id="articles" class="view"><h2>База знаний</h2><div id="articles-list"></div></div>
<div id="shop" class="view"><h2>Магазин</h2><div id="shop-list"></div><h2>Глоссарий</h2><div id="glossary-list"></div></div>
<div id="profile" class="view"><h2>Профиль пользователя</h2><div class="card"><h3>Статистика</h3><p>XP: <span id="prof-xp">0</span></p><p>Trust Score: <span id="prof-trust">0</span></p></div><h2>Настройки</h2><div class="form-box"><p>Экспорт данных:</p><button class="btn-sec" onclick="alert('Функция экспорта в разработке')">Скачать JSON</button></div></div>
</main>
</div>
<script src="assets/js/core/database.js"></script>
<script src="assets/js/core/engine.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
